  const graphHeight = height - padding * 2
  const maxVal = Math.max(...chartData.values)
  const points = chartData.values.map((v, i) => ({
    x: padding + (i / (chartData.values.length - 1)) * graphWidth,
    y: padding + graphHeight - (v / maxVal) * graphHeight
  }))
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ')
  const areaPath = `${linePath} L${points[points.length - 1].x},${padding + graphHeight} L${points[0].x},${padding + graphHeight} Z`

        {points.map((p, i) => (

            <th className="text-left py-3 px-3 text-slate-400 font-medium text-xs">Role</th>
            <th
              className="text-left py-3 px-3 text-slate-400 font-medium text-xs cursor-pointer hover:text-white transition-colors"
              onClick={() => handleSort('stage')}
            >
              Stage {sortField === 'stage' && (sortDir === 'asc' ? '↑' : '↓')}
            </th>
            <th
              className="text-left py-3 px-3 text-slate-400 font-medium text-xs cursor-pointer hover:text-white transition-colors"
              onClick={() => handleSort('score')}
            >
              AI Score {sortField === 'score' && (sortDir === 'asc' ? '↑' : '↓')}
            </th>
            <th
              className="text-left py-3 px-3 text-slate-400 font-medium text-xs cursor-pointer hover:text-white transition-colors"
              onClick={() => handleSort('date')}
            >
              Date {sortField === 'date' && (sortDir === 'asc' ? '↑' : '↓')}
            </th>
          </tr>
        </thead>
        <tbody>
          {sorted.map((item) => (
            <tr key={item.id} className="border-b border-white/5 hover:bg-white/[0.03] transition-colors cursor-pointer">
              <td className="py-3 px-3">
                <div className="flex items-center gap-2">
                  <div className="w-7 h-7 rounded-full bg-gradient-to-br from-[#1E3A5F] to-[#00B4D8] flex items-center justify-center">
                    <span className="text-xs text-white font-medium">
                      {item.candidate.split(' ').map(n => n[0]).join('')}
                    </span>
                  </div>
                  <span className="text-slate-200 font-medium">{item.candidate}</span>
                </div>
              </td>
              <td className="py-3 px-3 text-slate-400">{item.role}</td>
              <td className="py-3 px-3">
                <span className={`px-2 py-0.5 rounded text-xs font-medium ${stageColors[item.stage] || 'bg-white/5 text-slate-400'}`}>
                  {item.stage}
                </span>
              </td>
              <td className="py-3 px-3">
                <div className="flex items-center gap-2">
                  <div className="w-16 h-1.5 bg-white/5 rounded-full">
                    <div
                      className={`h-full rounded-full ${
                        item.score >= 90 ? 'bg-emerald-500' : item.score >= 80 ? 'bg-[#00B4D8]' : 'bg-yellow-500'
                      }`}
                      style={{ width: `${item.score}%` }}
                    />
                  </div>
                  <span className="text-slate-400 text-xs">{item.score}%</span>
                </div>
              </td>
              <td className="py-3 px-3 text-slate-500 text-xs">{item.date}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  )
}
